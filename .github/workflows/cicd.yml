name: Backend CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ── Build & lint on every push / PR ──────────────────────
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build NestJS
        run: npm run build

  # ── Deploy to cPanel (main branch only) ──────────────────
  deploy:
    name: Deploy to cPanel
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT || 22 }}
          script: |
            set -e
            # UPDATE: path where cPanel Git cloned this repo
            REPO_PATH="${{ secrets.CPANEL_REPO_PATH }}"
            cd "$REPO_PATH"
            git fetch origin
            git reset --hard origin/main 2>/dev/null || git reset --hard origin/master
            # .cpanel.yml deployment tasks run automatically on git pull in cPanel UI,
            # or run deploy manually:
            cd "$REPO_PATH" && npm ci && node scripts/copy-prisma-client.js && npm run build
            touch "${{ secrets.CPANEL_APP_ROOT }}/tmp/restart.txt" 2>/dev/null || true

      - name: Health check (optional)
        if: ${{ secrets.CPANEL_API_URL != '' }}
        run: |
          sleep 5
          curl -sf "${{ secrets.CPANEL_API_URL }}/api/v1" -o /dev/null || echo "API root check skipped"
