---
# Runs after git pull / Deploy in cPanel Git Version Control
# Set DEPLOYPATH to your clone folder (same as Node.js application root)

deployment:
  tasks:
    - export DEPLOYPATH=/home/petzonep/nodeapps/hisaab-api
    - cd $DEPLOYPATH && /usr/local/bin/npm install
    - cd $DEPLOYPATH && /usr/local/bin/npm run deploy:cpanel
    - /usr/local/bin/touch $DEPLOYPATH/tmp/restart.txt 2>/dev/null || true
